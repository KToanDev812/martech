services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: martech-postgres
    environment:
      POSTGRES_USER: martech
      POSTGRES_PASSWORD: martech_password
      POSTGRES_DB: martech
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    networks:
      - martech-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U martech"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: martech-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://martech:martech_password@postgres:5432/martech
    ports:
      - "3001:3001"
    volumes:
      - ./backend/src:/app/src:ro
      - ./backend/package.json:/app/package.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - martech-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3002/api/v1
    container_name: martech-frontend
    env_file:
      - ./frontend/.env
    ports:
      - "3000:5173"
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/package.json:/app/package.json:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro
      - ./frontend/tsconfig.json:/app/tsconfig.json:ro
    depends_on:
      - backend
    networks:
      - martech-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  martech-network:
    driver: bridge
